<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <title>Daily Budget Clock-In – 192px Icon</title>
  <defs>
    <radialGradient id="glow" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#5B7FD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0F2260" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="38" fill="#1E3A8A"/>
  <rect width="192" height="192" rx="38" fill="url(#glow)"/>

  <!-- Clock face -->
  <circle cx="96" cy="96" r="64" fill="#162D6B"/>
  <circle cx="96" cy="96" r="64" fill="none" stroke="#3A5DB5" stroke-width="3.5"/>

  <!-- Tick marks -->
  <g stroke="#4A70CC" stroke-linecap="round">
    <!-- 12 --> <line x1="96" y1="39" x2="96" y2="49" stroke-width="2.5"/>
    <!-- 3  --> <line x1="153" y1="96" x2="143" y2="96" stroke-width="2.5"/>
    <!-- 6  --> <line x1="96" y1="153" x2="96" y2="143" stroke-width="2.5"/>
    <!-- 9  --> <line x1="39" y1="96" x2="49" y2="96" stroke-width="2.5"/>
    <!-- 1  --> <line x1="128" y1="47" x2="122" y2="56" stroke-width="1.5"/>
    <!-- 2  --> <line x1="151" y1="70" x2="142" y2="76" stroke-width="1.5"/>
    <!-- 4  --> <line x1="151" y1="122" x2="142" y2="116" stroke-width="1.5"/>
    <!-- 5  --> <line x1="128" y1="145" x2="122" y2="136" stroke-width="1.5"/>
    <!-- 7  --> <line x1="64" y1="145" x2="70" y2="136" stroke-width="1.5"/>
    <!-- 8  --> <line x1="41" y1="122" x2="50" y2="116" stroke-width="1.5"/>
    <!-- 10 --> <line x1="41" y1="70" x2="50" y2="76" stroke-width="1.5"/>
    <!-- 11 --> <line x1="64" y1="47" x2="70" y2="56" stroke-width="1.5"/>
  </g>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="96" y1="96" x2="68" y2="66" stroke="#E8F0FF" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock) -->
  <line x1="96" y1="96" x2="120" y2="62" stroke="#E8F0FF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="96" cy="96" r="6" fill="#E8F0FF"/>
  <circle cx="96" cy="96" r="3" fill="#1E3A8A"/>

  <!-- Dollar sign -->
  <text x="70" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#F5C842" text-anchor="middle">$</text>

  <!-- Green badge (bottom-right) -->
  <circle cx="148" cy="148" r="22" fill="#0F1F55"/>
  <circle cx="148" cy="148" r="19" fill="#22C55E"/>
  <!-- Checkmark -->
  <polyline points="139,148 146,156 159,139" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
