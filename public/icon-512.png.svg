<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>Daily Budget Clock-In – 512px Icon</title>
  <defs>
    <radialGradient id="glow" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#5B7FD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0F2260" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="#1E3A8A"/>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Clock face -->
  <circle cx="256" cy="256" r="170" fill="#162D6B"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#3A5DB5" stroke-width="9"/>

  <!-- Tick marks -->
  <g stroke="#4A70CC" stroke-linecap="round">
    <!-- 12 --> <line x1="256" y1="95"  x2="256" y2="122" stroke-width="7"/>
    <!-- 3  --> <line x1="417" y1="256" x2="390" y2="256" stroke-width="7"/>
    <!-- 6  --> <line x1="256" y1="417" x2="256" y2="390" stroke-width="7"/>
    <!-- 9  --> <line x1="95"  y1="256" x2="122" y2="256" stroke-width="7"/>
    <!-- 1  --> <line x1="341" y1="118" x2="325" y2="143" stroke-width="4"/>
    <!-- 2  --> <line x1="403" y1="181" x2="378" y2="197" stroke-width="4"/>
    <!-- 4  --> <line x1="403" y1="331" x2="378" y2="315" stroke-width="4"/>
    <!-- 5  --> <line x1="341" y1="394" x2="325" y2="369" stroke-width="4"/>
    <!-- 7  --> <line x1="171" y1="394" x2="187" y2="369" stroke-width="4"/>
    <!-- 8  --> <line x1="109" y1="331" x2="134" y2="315" stroke-width="4"/>
    <!-- 10 --> <line x1="109" y1="181" x2="134" y2="197" stroke-width="4"/>
    <!-- 11 --> <line x1="171" y1="118" x2="187" y2="143" stroke-width="4"/>
  </g>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="256" y1="256" x2="176" y2="172" stroke="#E8F0FF" stroke-width="13" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock) -->
  <line x1="256" y1="256" x2="322" y2="166" stroke="#E8F0FF" stroke-width="9" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="#E8F0FF"/>
  <circle cx="256" cy="256" r="8" fill="#1E3A8A"/>

  <!-- Dollar sign -->
  <text x="192" y="346" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="#F5C842" text-anchor="middle">$</text>

  <!-- Green badge (bottom-right) -->
  <circle cx="394" cy="394" r="58" fill="#0F1F55"/>
  <circle cx="394" cy="394" r="50" fill="#22C55E"/>
  <!-- Checkmark -->
  <polyline points="370,394 388,414 422,372" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
